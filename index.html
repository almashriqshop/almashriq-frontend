<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/jpeg" href="/logo.jpg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Base SEO tags (will be overwritten dynamically by react-helmet-async) -->
    <title>Al Mashriq | Luxury Perfume House</title>
    <meta name="description" content="Discover Al Mashriq, an ultra-luxury digital fragrance store. Bespoke Cambodi Oudh, Mysore Sandalwood, and Indian Jasmine absolute perfumery. Delivering all over India." />
    
    <!-- Open Graph / Social Sharing -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Al Mashriq | Luxury Perfume House" />
    <meta property="og:description" content="Bespoke Cambodi Oudh, Mysore Sandalwood, and Indian Jasmine absolute perfumery. Delivering all over India." />
    <meta property="og:image" content="/logo.jpg" />
    <meta property="og:url" content="https://almashriq.shop" />
    
    <!-- Twitter Cards -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Al Mashriq | Luxury Perfume House" />
    <meta name="twitter:description" content="Bespoke Cambodi Oudh, Mysore Sandalwood, and Indian Jasmine absolute perfumery." />
    <meta name="twitter:image" content="/logo.jpg" />

    <!-- Google Web Fonts for Luxury Serif Headings and Inter Sans Body -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- Google Identity Services for Sign-In -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
  </head>
  <body class="bg-luxury-black text-luxury-cream antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
